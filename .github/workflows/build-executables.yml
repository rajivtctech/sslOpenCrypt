name: Build Executables

# Triggers:
#   - Push a version tag:  git tag v1.1.0 && git push origin v1.1.0
#   - Manual run from the GitHub Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Opt into Node.js 24 now to silence the Node.js 20 deprecation warnings
# from actions/checkout, actions/setup-python, actions/cache.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset_name: sslOpenCrypt-Linux
            platform_label: Linux (x86_64)

          # macos-13 (Intel x86_64) has been retired by GitHub — using macos-14
          # (Apple Silicon arm64) as the sole macOS target. Intel Mac users can
          # run this via Rosetta 2.
          - os: macos-14
            asset_name: sslOpenCrypt-macOS
            platform_label: macOS (arm64 / Apple Silicon)

          - os: windows-latest
            asset_name: sslOpenCrypt-Windows.exe
            platform_label: Windows (x86_64)

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Cache pip packages across runs — saves ~60s per build on warm cache
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('sslopencrypt/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Qt6 on Linux requires xcb and EGL platform plugins at build time
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libegl1 \
            libgl1 \
            upx-ucl

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx --yes --no-progress

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r sslopencrypt/requirements.txt
          pip install pyinstaller

      # python-pkcs11 needs a C compiler on some platforms.
      # It is optional — the app degrades gracefully without it.
      - name: Install python-pkcs11 (optional)
        run: pip install python-pkcs11 || echo "python-pkcs11 not available on this platform — PKCS#11 hardware token support will be disabled in this build"
        shell: bash

      - name: Show build environment
        run: |
          python --version
          pip show pyinstaller pyhanko cryptography argon2-cffi PyQt6 | grep -E "^(Name|Version)"
        shell: bash

      - name: Build executable
        working-directory: sslopencrypt
        run: >
          pyinstaller packaging/sslopencrypt.spec
          --distpath dist/
          --workpath build/
          --noconfirm

      # The spec names the binary sslOpenCrypt-Linux / sslOpenCrypt-macOS /
      # sslOpenCrypt-Windows based on sys.platform. Rename to the matrix
      # asset_name so the upload step always finds the right file.
      - name: Rename binary to asset name (Linux / macOS)
        if: runner.os != 'Windows'
        working-directory: sslopencrypt/dist
        run: |
          ls -lh
          # Find the binary produced (any executable file), rename if needed
          BUILT=$(find . -maxdepth 1 -type f -not -name "*.pkg" | head -1 | sed 's|^\./||')
          echo "Built file: $BUILT"
          if [ "$BUILT" != "${{ matrix.asset_name }}" ]; then
            mv "$BUILT" "${{ matrix.asset_name }}"
            echo "Renamed $BUILT → ${{ matrix.asset_name }}"
          fi
          ls -lh
          echo "Binary size: $(du -sh ${{ matrix.asset_name }} | cut -f1)"

      - name: Verify build output (Windows)
        if: runner.os == 'Windows'
        working-directory: sslopencrypt/dist
        run: |
          dir
          if (!(Test-Path "${{ matrix.asset_name }}")) { Write-Error "ERROR: expected binary not found"; exit 1 }
          $size = (Get-Item "${{ matrix.asset_name }}").length / 1MB
          Write-Host ("Binary size: {0:N1} MB" -f $size)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: sslopencrypt/dist/${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 30

  release:
    # Only publish a release when triggered by a version tag push
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh artifacts/

      - name: Make Linux / macOS executables runnable
        run: |
          chmod +x artifacts/sslOpenCrypt-Linux  || true
          chmod +x artifacts/sslOpenCrypt-macOS  || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: sslOpenCrypt ${{ github.ref_name }}
          body: |
            ## sslOpenCrypt ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | Linux x86_64 | `sslOpenCrypt-Linux` | Ubuntu 22.04+, Debian 12+, Fedora 38+ |
            | macOS (Apple Silicon) | `sslOpenCrypt-macOS` | macOS 14+ native arm64; also runs on Intel Mac via Rosetta 2 |
            | Windows x86_64 | `sslOpenCrypt-Windows.exe` | Windows 10 / 11 |

            ### First run

            **Linux:**
            ```bash
            chmod +x sslOpenCrypt-Linux
            ./sslOpenCrypt-Linux
            ```

            **macOS:**
            ```bash
            chmod +x sslOpenCrypt-macOS
            # First run: right-click → Open (to bypass Gatekeeper on unsigned binary)
            ./sslOpenCrypt-macOS
            ```

            **Windows:** Double-click `sslOpenCrypt-Windows.exe`. Windows SmartScreen may warn on first run — click **More info → Run anyway**.

            ### System requirements

            OpenSSL and (optionally) GnuPG must be installed on the host — they are **not bundled**.

            | OS | Install |
            |---|---|
            | Ubuntu / Debian | `sudo apt install openssl gnupg` |
            | macOS | `brew install openssl gnupg` |
            | Windows | [Win64 OpenSSL](https://slproweb.com/products/Win32OpenSSL.html) + [Gpg4win](https://gpg4win.org) |

            > **India DSC note:** On-token PKCS#11 signing and PAdES PDF signing require the vendor USB token driver (libcastle.so / libeToken.so on Linux, equivalent on macOS/Windows). These are not bundled and must be installed separately from the token manufacturer.
          files: |
            artifacts/sslOpenCrypt-Linux
            artifacts/sslOpenCrypt-macOS
            artifacts/sslOpenCrypt-Windows.exe
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
